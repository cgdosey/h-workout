function icon(name, cls = 'w-5 h-5') {
  const def = ICONS[name];
  if (!def) return '';
  const paths = typeof def === 'object' ? def.paths : def;
  const filled = typeof def === 'object' && def.filled;
  return `<svg class="${cls}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="${filled ? 'none' : 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
}

// ====================================================================
// STATE
// ====================================================================
const state = {
  activeView: 'home',         // 'home' | 'detail' | 'history'
  activeWorkout: null,
  workoutType: null,          // 'resistance' | 'cooldown' | 'cardio'
  completedExercises: new Set(),
  pendingWeightLogs: {},      // { exerciseId: { weight, effort } }
  openVideos: new Set(),
  exerciseWeights: {},        // current session weights
  workoutHistory: [],
  weightLog: {},
  confirmReset: false,
  expandedExercises: new Set(),
};

// ====================================================================
// STORAGE
// ====================================================================
function loadStorage() {
  try { const h = localStorage.getItem('sweat_workout_history'); if (h) state.workoutHistory = JSON.parse(h); } catch(e) {}
  try { const w = localStorage.getItem('sweat_weight_log');     if (w) state.weightLog     = JSON.parse(w); } catch(e) {}
}

// ====================================================================
// WEIGHT LOG UTILS
// ====================================================================
function getLastLog(exerciseId) {
  const entries = state.weightLog[exerciseId];
  return entries && entries.length > 0 ? entries[0] : null;
}
function getSuggestedWeight(exerciseId) {
  const last = getLastLog(exerciseId);
  if (!last || last.weight <= 0) return null;
  if (last.effort <= 2) return last.weight + 2.5;
  if (last.effort === 3) return last.weight;
  return Math.max(0, last.weight - 2.5);
}

// ====================================================================
// ACTIONS
// ====================================================================
function openWorkout(workoutId, type) {
  let workout;
  if (type === 'resistance') {
    workout = workoutProgram.resistance_sections.find(w => w.id === workoutId);
  } else if (type === 'cooldown') {
    workout = workoutProgram.cool_down;
  } else if (type === 'cardio') {
    workout = workoutProgram.cardio_sections.find(c => c.id === workoutId);
  }
  if (!workout) return;

  // Init exercise weights from last log
  const weights = {};
  if (type === 'resistance') {
    workout.blocks.forEach(b => b.exercises.forEach(ex => {
      weights[ex.id] = getLastLog(ex.id)?.weight ?? 0;
    }));
  }

  state.activeWorkout   = workout;
  state.workoutType     = type;
  state.completedExercises = new Set();
  state.pendingWeightLogs  = {};
  state.openVideos         = new Set();
  state.exerciseWeights    = weights;
  state.activeView         = 'detail';
  render(); window.scrollTo(0, 0);
}

function goHome() {
  state.activeView      = 'home';
  state.activeWorkout   = null;
  state.workoutType     = null;
  state.completedExercises = new Set();
  state.pendingWeightLogs  = {};
  state.openVideos         = new Set();
  state.exerciseWeights    = {};
  render(); window.scrollTo(0, 0);
}

function openHistory() {
  state.activeView         = 'history';
  state.expandedExercises  = new Set();
  state.confirmReset       = false;
  render(); window.scrollTo(0, 0);
}

function toggleBlock(exerciseIds) {
  const allDone = exerciseIds.every(id => state.completedExercises.has(id));
  if (allDone) { exerciseIds.forEach(id => state.completedExercises.delete(id)); }
  else         { exerciseIds.forEach(id => state.completedExercises.add(id)); }
  render();
}

function finishWorkout() {
  if (!state.activeWorkout) return;
  const newEntry = {
    workoutId:   state.activeWorkout.id || 'unknown',
    workoutName: state.activeWorkout.workout_name,
    completedAt: new Date().toISOString()
  };
  state.workoutHistory = [newEntry, ...state.workoutHistory];
  localStorage.setItem('sweat_workout_history', JSON.stringify(state.workoutHistory));

  const pending = Object.entries(state.pendingWeightLogs);
  if (pending.length > 0) {
    const now = new Date().toISOString();
    pending.forEach(([id, { weight, effort }]) => {
      const prev = state.weightLog[id] ?? [];
      state.weightLog[id] = [{ date: now, weight, effort }, ...prev].slice(0, 30);
    });
    localStorage.setItem('sweat_weight_log', JSON.stringify(state.weightLog));
  }
  state.pendingWeightLogs  = {};
  state.completedExercises = new Set();
}

function handleFinishWorkout() {
  const duration = 3000, end = Date.now() + duration;
  const frame = () => {
    confetti({ particleCount: 5, angle: 60,  spread: 55, origin: { x: 0 }, colors: ['#EC008C','#00A79D','#FFFFFF'] });
    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#EC008C','#00A79D','#FFFFFF'] });
    if (Date.now() < end) requestAnimationFrame(frame);
  };
  frame();
  finishWorkout();
  showToast('Workout Complete! 🎉', 'Great job crushing your session.');
  setTimeout(goHome, 2000);
}

function isWorkoutCompleted(workoutId) {
  const today = new Date().toDateString();
  return state.workoutHistory.some(e => e.workoutId === workoutId && new Date(e.completedAt).toDateString() === today);
}

function handleReset() {
  localStorage.removeItem('sweat_workout_history');
  localStorage.removeItem('sweat_weight_log');
  state.workoutHistory = [];
  state.weightLog      = {};
  state.confirmReset   = false;
  render();
}

// ====================================================================
// TOAST
// ====================================================================
function showToast(title, desc) {
  const t = document.createElement('div');
  t.className = 'fixed top-5 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-xl z-[200] text-center transition-all';
  t.style.minWidth = '220px';
  t.innerHTML = `<div class="font-bold text-sm">${title}</div><div class="text-xs text-gray-300 mt-0.5">${desc}</div>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ====================================================================
// HELPERS
// ====================================================================
function getEmbedInfo(url) {
  const isShort = url.includes('/shorts/');
  let videoId = '';
  if (isShort) { videoId = url.split('/shorts/')[1].split('?')[0]; }
  else { const m = url.match(/[?&]v=([^&]+)/); videoId = m ? m[1] : ''; }
  return { embedUrl: `https://www.youtube.com/embed/${videoId}`, isShort };
}

function fmtDate(iso) {
  const d = new Date(iso), today = new Date(), yest = new Date(today);
  yest.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yest.toDateString())  return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

// ====================================================================
function renderExerciseCard(ex, showWeightTracker) {
  const done       = state.completedExercises.has(ex.id);
  const videoOpen  = state.openVideos.has(ex.id);
  const pending    = state.pendingWeightLogs[ex.id];
  const isRecorded = !!pending;
  const effort     = pending?.effort ?? null;
  const weight     = state.exerciseWeights[ex.id] ?? 0;
  const suggested  = showWeightTracker && !ex.noWeightInput ? getSuggestedWeight(ex.id) : null;
  const { embedUrl, isShort } = getEmbedInfo(ex.video);

  const EFFORT_LABELS  = ['Too Easy','Easy','Good','Hard','Max'];
  const EFFORT_ACTIVE  = [
    'bg-teal-100 text-teal-700 border-teal-400',
    'bg-green-100 text-green-700 border-green-400',
    'bg-yellow-100 text-yellow-700 border-yellow-400',
    'bg-orange-100 text-orange-700 border-orange-400',
    'bg-red-100 text-red-700 border-red-400',
  ];

  let weightTrackerHtml = '';
  if (showWeightTracker) {
    const suggBadge = suggested !== null ? `
      <div class="flex items-center gap-2 pt-1">
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Suggested</span>
        <span class="text-xs font-black text-secondary px-2 py-0.5 rounded-full" style="background-color:rgba(0,167,157,0.1)">${Number.isInteger(suggested) ? suggested : suggested.toFixed(1)} lbs</span>
        <span class="text-[10px] text-gray-300">based on last session</span>
      </div>` : '';

    const weightRow = !ex.noWeightInput ? `
      ${suggBadge}
      <div class="flex items-center gap-3">
        ${icon('dumbbell','w-4 h-4 text-gray-400 shrink-0')}
        <div class="flex items-center gap-2">
          <button data-action="adjust-weight" data-exercise-id="${ex.id}" data-delta="-2.5"
            class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 font-bold text-base flex items-center justify-center active:scale-95 transition-transform">−</button>
          <div class="text-center w-20" id="weight-display-${ex.id}">
            <span class="font-black text-gray-900 text-base">${Number.isInteger(weight) ? weight : weight.toFixed(1)}</span>
            <span class="text-xs text-gray-400 ml-1">lbs</span>
          </div>
          <button data-action="adjust-weight" data-exercise-id="${ex.id}" data-delta="2.5"
            class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 font-bold text-base flex items-center justify-center active:scale-95 transition-transform">+</button>
        </div>
        <span id="saved-badge-${ex.id}" class="ml-auto text-xs font-bold text-secondary flex items-center gap-1 ${isRecorded ? '' : 'hidden'}">
          ${icon('check','w-3.5 h-3.5')} Saved
        </span>
      </div>` : '';

    const effortBtns = EFFORT_LABELS.map((label, i) => {
      const val = i + 1;
      const sel = effort === val;
      return `<button data-action="select-effort" data-exercise-id="${ex.id}" data-effort="${val}" data-no-weight="${ex.noWeightInput ? '1' : '0'}"
        title="${label}"
        class="effort-btn flex-1 h-9 rounded-lg text-xs font-bold border-2 transition-all active:scale-95 ${sel ? EFFORT_ACTIVE[i] + ' scale-105 shadow-sm' : 'bg-gray-50 text-gray-400 border-transparent'}"
        data-effort-active-class="${EFFORT_ACTIVE[i]}"
      >${val}</button>`;
    }).join('');

    const savedNoWeight = ex.noWeightInput ? `
      <span id="saved-badge-${ex.id}" class="text-xs font-bold text-secondary flex items-center gap-1 ${isRecorded ? '' : 'hidden'}">
        ${icon('check','w-3.5 h-3.5')} Saved
      </span>` : '';

    weightTrackerHtml = `
      <div class="px-4 pb-4 pt-1 border-t border-gray-100 space-y-3">
        ${weightRow}
        <div class="space-y-1.5">
          <div class="flex items-center justify-between">

          <div class="flex justify-between text-[9px] text-gray-300 font-semibold px-0.5">

          </div>
        </div>
      </div>`;
  }

  const videoHtml = videoOpen ? `
    <div class="w-full ${isShort ? 'max-h-96' : ''}" style="${isShort ? 'aspect-ratio:9/16' : 'aspect-ratio:16/9'}">
      <iframe src="${embedUrl}?autoplay=1&rel=0&modestbranding=1" class="w-full h-full"
        allow="autoplay; encrypted-media; fullscreen" allowfullscreen title="${ex.name}"></iframe>
    </div>` : '';

  return `
    <div class="bg-white rounded-xl shadow-card border border-gray-50 overflow-hidden" id="card-${ex.id}">
      <div class="p-4 flex items-center justify-between gap-4">
        <div class="flex-1 min-w-0">
          <h4 class="font-bold text-sm mb-1 transition-colors ${done ? 'text-gray-400 line-through' : 'text-primary'}">${ex.name}</h4>

        </button>
      </div>
      ${weightTrackerHtml}
      ${videoHtml}
    </div>`;
}

function renderBlockCheck(exerciseIds) {
  const allDone  = exerciseIds.length > 0 && exerciseIds.every(id => state.completedExercises.has(id));
  const idsJson  = JSON.stringify(exerciseIds);
  return `
    <button data-action="toggle-block" data-exercise-ids='${idsJson}'
      class="w-9 h-9 rounded-full flex items-center justify-center transition-all shrink-0 ${allDone ? 'text-white shadow-md scale-110' : 'border-2 border-gray-200 text-gray-300'}"
      style="${allDone ? 'background-color:#EC008C' : ''}">
      ${icon('check', 'w-5 h-5')}
    </button>`;
}

// ====================================================================
// RENDER: PROGRESS BAR CALC
// ====================================================================
function getProgress() {
  const w = state.activeWorkout;
  if (!w) return 0;
  let allBlocks = [];
  if (state.workoutType === 'resistance') {
    allBlocks = [w.warm_up.map(e => e.id), ...w.blocks.map(b => b.exercises.map(e => e.id))];
  } else if (state.workoutType === 'cooldown') {
    allBlocks = [w.routine.map(e => e.id)];
  }
  if (allBlocks.length === 0) return 0;
  const done = allBlocks.filter(ids => ids.length > 0 && ids.every(id => state.completedExercises.has(id))).length;
  return (done / allBlocks.length) * 100;
}

// ====================================================================
// RENDER: HISTORY
// ====================================================================
function buildExerciseMap() {
  const map = {};
  workoutProgram.resistance_sections.forEach(s => {
    s.warm_up.forEach(ex     => { map[ex.id] = { name: ex.name, workoutName: s.workout_name, noWeightInput: !!ex.noWeightInput }; });
    s.blocks.forEach(b => b.exercises.forEach(ex => { map[ex.id] = { name: ex.name, workoutName: s.workout_name, noWeightInput: !!ex.noWeightInput }; }));
  });
  workoutProgram.cool_down.routine.forEach(ex => { map[ex.id] = { name: ex.name, workoutName: workoutProgram.cool_down.workout_name, noWeightInput: true }; });
  return map;
}

const EFFORT_LABELS_MAP = { 1:'Too Easy', 2:'Easy', 3:'Good', 4:'Hard', 5:'Max' };
const EFFORT_PILL_MAP   = { 1:'bg-teal-100 text-teal-700', 2:'bg-green-100 text-green-700', 3:'bg-yellow-100 text-yellow-700', 4:'bg-orange-100 text-orange-700', 5:'bg-red-100 text-red-700' };

function renderHistory() {
  const exerciseMap = buildExerciseMap();

  // Sessions
  const sessions = state.workoutHistory;
  const sessionsHtml = sessions.length === 0
    ? `<p class="text-sm text-gray-400 text-center py-6">No completed sessions yet.<br>Finish a workout to see it here.</p>`
    : sessions.slice(0, 30).map(s => `
        <div class="bg-white rounded-xl border border-gray-100 px-4 py-3 flex items-center justify-between">
          <div>
            <p class="font-bold text-sm text-gray-900">${s.workoutName}</p>
            <p class="text-xs text-gray-400">${fmtDate(s.completedAt)} · ${fmtTime(s.completedAt)}</p>
          </div>
          <span class="w-2 h-2 rounded-full shrink-0" style="background-color:#EC008C"></span>
        </div>`).join('');

  // Weight progress
  const logOrder = ['Full Body (Hinge + Squat)', 'Unilateral + Abductors', 'Posterior Chain + Power'];
  const loggedExercises = Object.entries(state.weightLog)
    .filter(([,e]) => e.length > 0)
    .map(([id, entries]) => ({ id, entries, meta: exerciseMap[id] }))
    .filter(item => item.meta)
    .sort((a,b) => logOrder.indexOf(a.meta.workoutName) - logOrder.indexOf(b.meta.workoutName));

  const progressHtml = loggedExercises.length === 0
    ? `<p class="text-sm text-gray-400 text-center py-6">No weight data yet.<br>Log weights during a workout to track progress.</p>`
    : loggedExercises.map(({ id, entries, meta }) => {
        const latest   = entries[0];
        const expanded = state.expandedExercises.has(id);

        // Trend
        const weighted = entries.filter(e => e.weight > 0);
        let trendHtml = '';
        if (!meta.noWeightInput && weighted.length >= 2) {
          const diff = weighted[0].weight - weighted[weighted.length-1].weight;
          if (diff !== 0) {
            const up = diff > 0;
            trendHtml = `<span class="text-[10px] font-bold flex items-center gap-0.5 ${up?'text-green-600':'text-orange-600'}">
              ${icon('trending-up','w-3 h-3 ' + (up?'':'rotate-180'))}
              ${up?'+':''}${diff%1===0?diff:diff.toFixed(1)} lbs overall
            </span>`;
          }
        }

        const rowsHtml = expanded ? `
          <div class="border-t border-gray-50 px-4 pb-3">
            <table class="w-full text-xs">
              <thead><tr class="text-[10px] text-gray-400 uppercase tracking-wider">
                <th class="text-left py-2 font-bold">Date</th>
                ${!meta.noWeightInput ? '<th class="text-right py-2 font-bold">Weight</th>' : ''}
                <th class="text-right py-2 font-bold">Effort</th>
              </tr></thead>
              <tbody class="divide-y divide-gray-50">
                ${entries.map((e,i) => `
                  <tr class="${i===0?'font-bold':''}">
                    <td class="py-2 text-gray-600">${fmtDate(e.date)}<span class="text-gray-300 ml-1">${fmtTime(e.date)}</span></td>
                    ${!meta.noWeightInput ? `<td class="py-2 text-right text-gray-800">${e.weight>0?(e.weight%1===0?e.weight:e.weight.toFixed(1))+' lbs':'—'}</td>` : ''}
                    <td class="py-2 text-right"><span class="px-1.5 py-0.5 rounded-full text-[10px] font-bold ${EFFORT_PILL_MAP[e.effort]||'bg-gray-100 text-gray-500'}">${EFFORT_LABELS_MAP[e.effort]||e.effort}</span></td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>` : '';

        return `
          <div class="bg-white rounded-xl border border-gray-100 overflow-hidden">
            <button class="w-full p-4 text-left flex items-start gap-3" data-action="toggle-exercise-history" data-exercise-id="${id}">
              <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-0.5" style="background-color:${meta.noWeightInput?'rgba(0,167,157,0.1)':'rgba(236,0,140,0.1)'}">
                ${icon('dumbbell','w-4 h-4 ' + (meta.noWeightInput?'text-secondary':'text-primary'))}
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-sm text-gray-900 truncate">${meta.name}</p>
                <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-wide mb-1">${meta.workoutName}</p>
                <div class="flex items-center gap-2 flex-wrap">
                  ${!meta.noWeightInput && latest.weight > 0 ? `<span class="text-xs font-black text-primary">${latest.weight%1===0?latest.weight:latest.weight.toFixed(1)} lbs</span>` : ''}
                  <span class="text-[10px] font-bold px-1.5 py-0.5 rounded-full ${EFFORT_PILL_MAP[latest.effort]||'bg-gray-100 text-gray-500'}">${EFFORT_LABELS_MAP[latest.effort]||latest.effort}</span>
                  <span class="text-[10px] text-gray-300">${fmtDate(latest.date)}</span>
                  ${trendHtml}
                </div>
              </div>
              <div class="text-gray-300 shrink-0 mt-1">${expanded ? icon('chevron-up','w-4 h-4') : icon('chevron-down','w-4 h-4')}</div>
            </button>
            ${rowsHtml}
          </div>`;
      }).join('');

  // Reset section
  const resetHtml = state.confirmReset ? `
    <div class="rounded-xl p-5 space-y-4 border border-red-200" style="background-color:#fef2f2">
      <div class="flex items-start gap-3">
        ${icon('alert-triangle','w-5 h-5 text-red-500 shrink-0 mt-0.5')}
        <div>
          <p class="font-bold text-red-700 text-sm">Reset all progress?</p>
          <p class="text-xs text-red-500 mt-0.5">This will permanently delete all sessions, weight logs, and suggested weights. This cannot be undone.</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button data-action="cancel-reset" class="flex-1 py-2.5 rounded-lg bg-white border border-gray-200 text-sm font-bold text-gray-600">Cancel</button>
        <button data-action="do-reset"     class="flex-1 py-2.5 rounded-lg text-white text-sm font-bold" style="background-color:#ef4444">Yes, Reset</button>
      </div>
    </div>` : `
    <button data-action="confirm-reset"
      class="w-full flex items-center justify-center gap-2 py-3 rounded-xl border-2 border-dashed border-gray-200 text-gray-400 text-sm font-bold">
      ${icon('trash2','w-4 h-4')} Reset All Data
    </button>`;

  return `
    <div class="flex flex-col w-full min-h-screen bg-gray-50 pb-10">
      <div class="sticky top-0 z-40 bg-white shadow-sm">
        <div class="flex items-center px-4 h-16 relative">
          <button data-action="go-home" class="w-10 h-10 flex items-center justify-center text-gray-500 absolute left-2">${icon('arrow-left','w-6 h-6')}</button>
          <div class="w-full text-center px-10">
            <h2 class="font-bold text-gray-900">Progress</h2>
            <p class="text-[10px] uppercase font-bold text-gray-400">Workout History</p>
          </div>
        </div>
      </div>
      <div class="px-5 py-6 space-y-8">
        <section>
          <div class="flex items-center gap-2 mb-4">
            ${icon('calendar-days','w-4 h-4 text-primary')}
            <h3 class="font-black text-gray-900 uppercase tracking-tight text-sm">Sessions</h3>
          </div>
          <div class="space-y-2">${sessionsHtml}</div>
        </section>
        <section>
          <div class="flex items-center gap-2 mb-4">
            ${icon('trending-up','w-4 h-4 text-secondary')}
            <h3 class="font-black text-gray-900 uppercase tracking-tight text-sm">Weight Progress</h3>
          </div>
          <div class="space-y-2">${progressHtml}</div>
        </section>
        <section class="pt-2">${resetHtml}</section>
      </div>
    </div>`;
}

// ====================================================================
// MAIN RENDER
// ====================================================================
function render() {
  const app = document.getElementById('app');
  let html = '';
  if (state.activeView === 'home')    html = renderHome();
  else if (state.activeView === 'detail')  html = renderWorkoutDetail();
  else if (state.activeView === 'history') html = renderHistory();

  app.innerHTML = `
    <div class="min-h-screen w-full flex justify-center" style="background-color:#d1d5db">
      <div class="w-full max-w-[430px] bg-white relative shadow-2xl overflow-x-hidden min-h-[100dvh]">
        ${html}
      </div>
    </div>`;
}

// ====================================================================
// EVENT HANDLING
// ====================================================================
document.getElementById('app').addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'open-workout') {
    const id   = el.dataset.workoutId;
    const type = el.dataset.workoutType;
    openWorkout(id, type);
  }
  else if (action === 'go-home')    { goHome(); }
  else if (action === 'open-history') { openHistory(); }
  else if (action === 'open-cooldown') { openWorkout('CoolDown', 'cooldown'); }

  else if (action === 'toggle-block') {
    const ids = JSON.parse(el.dataset.exerciseIds);
    toggleBlock(ids);
  }

  else if (action === 'finish-workout') { handleFinishWorkout(); }

  else if (action === 'toggle-video') {
    const id = el.dataset.exerciseId;
    if (state.openVideos.has(id)) { state.openVideos.delete(id); }
    else                          { state.openVideos.add(id); }
    render();
  }

  else if (action === 'adjust-weight') {
    const id    = el.dataset.exerciseId;
    const delta = parseFloat(el.dataset.delta);
    const prev  = state.exerciseWeights[id] ?? 0;
    const next  = parseFloat(Math.max(0, prev + delta).toFixed(1));
    state.exerciseWeights[id] = next;
    // Direct DOM update
    const disp = document.getElementById(`weight-display-${id}`);
    if (disp) {
      disp.innerHTML = `<span class="font-black text-gray-900 text-base">${Number.isInteger(next)?next:next.toFixed(1)}</span><span class="text-xs text-gray-400 ml-1">lbs</span>`;
    }
  }

  else if (action === 'select-effort') {
    const id         = el.dataset.exerciseId;
    const effortVal  = parseInt(el.dataset.effort);
    const noWeight   = el.dataset.noWeight === '1';
    const weight     = noWeight ? 0 : (state.exerciseWeights[id] ?? 0);
    if (!noWeight && weight <= 0) return;

    state.pendingWeightLogs[id] = { weight, effort: effortVal };

    // Direct DOM update for effort buttons
    const row = document.getElementById(`effort-row-${id}`);
    if (row) {
      const EFFORT_ACTIVE = [
        'bg-teal-100 text-teal-700 border-teal-400',
        'bg-green-100 text-green-700 border-green-400',
        'bg-yellow-100 text-yellow-700 border-yellow-400',
        'bg-orange-100 text-orange-700 border-orange-400',
        'bg-red-100 text-red-700 border-red-400',
      ];
      row.querySelectorAll('[data-action="select-effort"]').forEach((btn, i) => {
        const val = i + 1;
        if (val === effortVal) {
          btn.className = btn.className.replace(/bg-\S+\s?|text-\S+\s?|border-\S+\s?/g, '').trim();
          btn.className = `effort-btn flex-1 h-9 rounded-lg text-xs font-bold border-2 transition-all active:scale-95 scale-105 shadow-sm ${EFFORT_ACTIVE[i]}`;
        } else {
          btn.className = 'effort-btn flex-1 h-9 rounded-lg text-xs font-bold border-2 transition-all active:scale-95 bg-gray-50 text-gray-400 border-transparent';
        }
      });
    }
    // Show saved badge
    const badge = document.getElementById(`saved-badge-${id}`);
    if (badge) badge.classList.remove('hidden');
  }

  else if (action === 'toggle-exercise-history') {
    const id = el.dataset.exerciseId;
    if (state.expandedExercises.has(id)) { state.expandedExercises.delete(id); }
    else                                  { state.expandedExercises.add(id); }
    render();
  }

  else if (action === 'confirm-reset') { state.confirmReset = true;  render(); }
  else if (action === 'cancel-reset')  { state.confirmReset = false; render(); }
  else if (action === 'do-reset')      { handleReset(); }
});

// ====================================================================
// INIT
// ====================================================================
loadStorage();
render();
</script>
</body>
</html>
