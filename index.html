// ====================================================================
// UTILS
// ====================================================================
function getCustomSchedule() { return state.customSchedule || workoutProgram.weekSchedule; }

function getLastLog(id)  { const e=state.weightLog[id]; return e&&e.length>0?e[0]:null; }
function getSuggestedWeight(id) {
  const l=getLastLog(id); if(!l||l.weight<=0) return null;
  if(l.effort<=2) return l.weight+2.5; if(l.effort===3) return l.weight;
  return Math.max(0,l.weight-2.5);
}
function getGreeting() { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }
function getEmbedInfo(url) {
  const isShort=url.includes('/shorts/'); let videoId='';
  if(isShort){videoId=url.split('/shorts/')[1].split('?')[0];}
  else{const m=url.match(/[?&]v=([^&]+)/);videoId=m?m[1]:'';}
  return {embedUrl:`https://www.youtube.com/embed/${videoId}`,isShort};
}
function fmtDate(iso) {
  const d=new Date(iso),t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return 'Today';
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function fmtTime(iso) { return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function fmtDuration(ms) { const m=Math.round(ms/60000); return m<1?'< 1 min':m===1?'1 min':`${m} min`; }
function isWorkoutCompleted(workoutId) {
  const today=new Date().toDateString();
  return state.workoutHistory.some(e=>e.workoutId===workoutId&&new Date(e.completedAt).toDateString()===today);
}

// Progress helpers
function getWeeklyCount() {
  const s=new Date(); s.setDate(s.getDate()-((s.getDay()+6)%7)); s.setHours(0,0,0,0);
  return state.workoutHistory.filter(e=>new Date(e.completedAt)>=s).length;
}
function getMonthlyCount() {
  const s=new Date(); s.setDate(1); s.setHours(0,0,0,0);
  return state.workoutHistory.filter(e=>new Date(e.completedAt)>=s).length;
}
function getStreak() {
  if(!state.workoutHistory.length) return 0;
  const dates=new Set(state.workoutHistory.map(e=>new Date(e.completedAt).toDateString()));
  let streak=0, d=new Date();
  if(!dates.has(d.toDateString())) d.setDate(d.getDate()-1);
  while(dates.has(d.toDateString())){streak++;d.setDate(d.getDate()-1);}
  return streak;
}

function openWorkout(workoutId,type) {
  let workout;
  if(type==='resistance') workout=workoutProgram.resistance_sections.find(w=>w.id===workoutId);
  else if(type==='cooldown') workout=workoutProgram.cool_down;
  else if(type==='cardio') workout=workoutProgram.cardio_sections.find(c=>c.id===workoutId);
  if(!workout) return;
  const weights={};
  if(type==='resistance') workout.blocks.forEach(b=>b.exercises.forEach(ex=>{weights[ex.id]=getLastLog(ex.id)?.weight??0;}));
  Object.assign(state,{activeWorkout:workout,workoutType:type,completedExercises:new Set(),pendingWeightLogs:{},openVideos:new Set(),exerciseWeights:weights,workoutStartTime:Date.now(),warmUpCollapsed:false,activeView:'detail'});
  render(); window.scrollTo(0,0);
}
function goHome() {
  Object.assign(state,{activeView:'home',activeWorkout:null,workoutType:null,completedExercises:new Set(),pendingWeightLogs:{},openVideos:new Set(),exerciseWeights:{},completionRating:0});
  render(); window.scrollTo(0,0);
}
function openHistory() { state.activeView='history'; state.expandedExercises=new Set(); state.confirmReset=false; render(); window.scrollTo(0,0); }

function openPlanner() {
  state.plannerEditDay=null;
  state.activeView='planner';
  render(); window.scrollTo(0,0);
}
function openProgress() { state.activeView='progress'; render(); window.scrollTo(0,0); }

function toggleBlock(exerciseIds) {
  const allDone=exerciseIds.every(id=>state.completedExercises.has(id));
  if(allDone){exerciseIds.forEach(id=>state.completedExercises.delete(id));}
  else{exerciseIds.forEach(id=>state.completedExercises.add(id));}
  render();
}
function finishWorkout() {
  if(!state.activeWorkout) return;
  const duration=state.workoutStartTime?Date.now()-state.workoutStartTime:0;
  state.lastWorkoutDuration=duration; state.lastWorkoutName=state.activeWorkout.workout_name;
  const newEntry={workoutId:state.activeWorkout.id||'unknown',workoutName:state.activeWorkout.workout_name,completedAt:new Date().toISOString()};
  state.workoutHistory=[newEntry,...state.workoutHistory];
  localStorage.setItem('sweat_workout_history',JSON.stringify(state.workoutHistory));
  const pending=Object.entries(state.pendingWeightLogs);
  if(pending.length>0){
    const now=new Date().toISOString();
    pending.forEach(([id,{weight,effort}])=>{const prev=state.weightLog[id]??[];state.weightLog[id]=[{date:now,weight,effort},...prev].slice(0,30);});
    localStorage.setItem('sweat_weight_log',JSON.stringify(state.weightLog));
  }
  state.pendingWeightLogs={}; state.completedExercises=new Set();
}
function handleFinishWorkout() {
  const end=Date.now()+3000;
  (function frame(){confetti({particleCount:5,angle:60,spread:55,origin:{x:0},colors:['#F5C300','#00A79D','#FFFFFF']});confetti({particleCount:5,angle:120,spread:55,origin:{x:1},colors:['#F5C300','#00A79D','#FFFFFF']});if(Date.now()<end)requestAnimationFrame(frame);})();
  finishWorkout(); state.completionRating=0; state.activeView='complete'; render(); window.scrollTo(0,0);
}
function handleReset() {
  localStorage.removeItem('sweat_workout_history'); localStorage.removeItem('sweat_weight_log'); localStorage.removeItem('sweat_schedule');
  Object.assign(state,{workoutHistory:[],weightLog:{},customSchedule:null,confirmReset:false}); render();
}

  localStorage.removeItem('sweat_schedule');

  render();

function exportData() {
  const data={version:1,exportedAt:new Date().toISOString(),workoutHistory:state.workoutHistory,weightLog:state.weightLog,customSchedule:state.customSchedule};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`heathers-workout-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exported!','Your data has been downloaded.');
}
function importData(file) {
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const data=JSON.parse(e.target.result);
      if(data.workoutHistory){state.workoutHistory=data.workoutHistory;localStorage.setItem('sweat_workout_history',JSON.stringify(state.workoutHistory));}
      if(data.weightLog)    {state.weightLog=data.weightLog;localStorage.setItem('sweat_weight_log',JSON.stringify(state.weightLog));}
      if(data.customSchedule){state.customSchedule=data.customSchedule;localStorage.setItem('sweat_schedule',JSON.stringify(state.customSchedule));}
      showToast('Data imported!',`${state.workoutHistory.length} sessions restored.`);
      render();
    } catch(err){ showToast('Import failed','Invalid backup file.'); }
  };
  reader.readAsText(file);
}

function showToast(title,desc) {
  const t=document.createElement('div');
  t.className='fixed top-5 left-1/2 -translate-x-1\/2 bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-xl z-[200] text-center';
  t.style.cssText='min-width:220px;transform:translateX(-50%)';
  t.innerHTML=`<div class="font-bold text-sm">${title}</div>${desc?`<div style="font-size:11px;color:#9ca3af;margin-top:2px">${desc}</div>`:''}`;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2800);
}

// PROGRESS BAR CALC
// ====================================================================
function getProgress() {
  const w=state.activeWorkout; if(!w) return 0;
  let blocks=[];
  if(state.workoutType==='resistance') blocks=[w.warm_up.map(e=>e.id),...w.blocks.map(b=>b.exercises.map(e=>e.id))];
  else if(state.workoutType==='cooldown') blocks=[w.routine.map(e=>e.id)];
  if(!blocks.length) return 0;
  const done=blocks.filter(ids=>ids.length>0&&ids.every(id=>state.completedExercises.has(id))).length;
  return (done/blocks.length)*100;
}

function renderCalendarStrip() {
  const DOW_MAP={Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6,Sun:0};
  const todayDow=new Date().getDay(), today=new Date(), startOfWeek=new Date(today);
  startOfWeek.setDate(today.getDate()-((today.getDay()+6)%7));
  return `
    <div class="flex gap-1 px-5 pb-5">
      ${getCustomSchedule().map((day,i)=>{
        const isToday=(DOW_MAP[day.day]??-1)===todayDow;
        const completed=!day.isRest&&isWorkoutCompleted(day.workoutId);
        const dayDate=new Date(startOfWeek); dayDate.setDate(startOfWeek.getDate()+i);
        const dateNum=dayDate.getDate();
        const todayBg=day.type==='cardio'?'#00A79D':'#F5C300';
        const todayFg=day.type==='cardio'?'#ffffff':'#111827';
        const dotColor=!day.isRest?(day.type==='cardio'?'#00A79D':'#F5C300'):'transparent';
        return `
          <div class="flex flex-col items-center gap-1 flex-1">
            <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#374151">${day.day}</span>
            <div class="w-8 h-8 rounded-full flex items-center justify-center" style="font-size:14px;font-weight:700;${isToday?'background:'+todayBg+';color:'+todayFg:'color:#374151'}">
              ${completed?'<svg class="w-4 h-4" style="color:'+(isToday?todayFg:'#2D6A4F')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17 4 12"/></svg>':dateNum}
            </div>
            <div class="w-1.5 h-1.5 rounded-full" style="background-color:${dotColor}"></div>
          </div>`;
      }).join('')}
    </div>`;
}

  const workoutCards=schedule.map(day=>{
    if(day.isRest) return `
      <div class="flex items-center bg-gray-100 rounded-2xl px-5 py-4 opacity-60 flex-shrink-0" style="min-width:185px">
        <div class="flex-1"><span style="font-size:10px;font-weight:900;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em">${day.day}</span>
          <p class="font-bold text-gray-500 mt-0.5">${day.workoutName}</p><p style="font-size:11px;color:#9ca3af;margin-top:2px">Rest &amp; Recovery</p></div>
        ${icon('moon','w-7 h-7 text-gray-300')}
      </div>`;
    const grad=CARD_GRADIENTS[day.workoutId]||'linear-gradient(135deg,#666,#444)';
    const icn=day.type==='cardio'?icon('bike','w-8 h-8 text-white opacity-90'):icon('dumbbell','w-8 h-8 text-white opacity-90');
    const completed=isWorkoutCompleted(day.workoutId);
    return `
      <div data-action="open-workout" data-workout-id="${day.workoutId}" data-workout-type="${day.type}"
        class="workout-card flex-shrink-0 cursor-pointer active:scale-[0.97] transition-transform" style="min-width:180px;height:220px;background:${grad}">
        <div class="relative z-10 h-full flex flex-col justify-between p-5">
          <div class="flex justify-between items-start">${icn}
            ${completed?`<div class="w-7 h-7 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,.2)">${icon('check','w-4 h-4 text-white')}</div>`:''}
          </div>
          <div>
            <span style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.7)">${day.day} · ${day.type==='cardio'?'Cardio':'Strength'}</span>
            <h3 class="font-black text-white text-lg leading-tight mt-1">${day.workoutName}</h3>
            <p style="font-size:11px;color:rgba(255,255,255,.8);font-weight:500;margin-top:4px">${day.meta||''}</p>
          </div>
        </div>
      </div>`;
  });

  const todayDay=schedule.find(d=>DOW_MAP[d.day]===todayDow);
  let todayBanner='';
  if(todayDay&&!todayDay.isRest){
    const grad=CARD_GRADIENTS[todayDay.workoutId]||'linear-gradient(135deg,#666,#444)';
    const icn=todayDay.type==='cardio'?icon('bike','w-5 h-5'):icon('dumbbell','w-5 h-5');
    const done=isWorkoutCompleted(todayDay.workoutId);
    todayBanner=`
      <div class="mb-6">
        <p style="font-size:11px;font-weight:900;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Today's Workout</p>
        <div data-action="open-workout" data-workout-id="${todayDay.workoutId}" data-workout-type="${todayDay.type}"
          class="workout-card cursor-pointer active:scale-[0.98] transition-transform" style="height:140px;background:${grad}">
          <div class="relative z-10 h-full flex items-end justify-between p-5">
            <div><div class="flex items-center gap-2 mb-1">${icn}<span style="font-size:11px;font-weight:900;color:rgba(255,255,255,.8);text-transform:uppercase">${todayDay.type==='cardio'?'Cardio':'Strength'}</span></div>
              <h3 class="font-black text-white text-xl">${todayDay.workoutName}</h3>
              <p style="font-size:11px;color:rgba(255,255,255,.8);margin-top:2px">${todayDay.meta||''}</p></div>
            ${done?`<div class="flex items-center gap-1.5 rounded-full px-3 py-1.5" style="background:rgba(255,255,255,.2)"><span style="font-size:11px;font-weight:700;color:white">Done</span>${icon('check-circle-2','w-4 h-4 text-white')}</div>`
              :`<div class="bg-white rounded-full px-4 py-2"><span style="font-size:12px;font-weight:900;color:#111827">START</span></div>`}
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="flex flex-col w-full min-h-screen pb-28" style="background:#FEFCE8">
      <div style="background:#2D6A4F;box-shadow:0 8px 32px rgba(0,0,0,0.28),0 2px 0 rgba(255,255,255,0.08) inset">
        <div class="px-5 flex items-center justify-between" style="padding-top:28px;padding-bottom:28px">
          <\!-- PWA-style logo + title -->
          <button data-action="go-home" class="flex items-center gap-3" style="background:none;border:none;cursor:pointer;padding:0">
            <img src="${window._appIcon||''}" style="width:54px;height:54px;flex-shrink:0" alt="logo">
            <span style="font-size:18px;font-weight:900;color:#ffffff;letter-spacing:.01em">HEATHER'S WORKOUT</span>
          </button>
          <\!-- Desktop nav tabs (hidden on mobile) -->
          <div class="desk-nav" style="display:none;gap:4px">
            ${[
              {label:'Workouts',action:'go-home',   active:true},
              {label:'Planner', action:'open-planner', active:false},
              {label:'Progress',action:'open-progress',active:false},
            ].map(it=>`<button data-action="${it.action}" style="padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:${it.active?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.15)'};color:${it.active?'#2D6A4F':'rgba(255,255,255,0.85)'}">${it.label}</button>`).join('')}
          </div>
        </div>
        <\!-- Calendar on white -->
        <div style="background:#ffffff;padding-top:12px">
          ${renderCalendarStrip()}
        </div>
      </div>
      <div class="px-5 py-6">
        ${todayBanner}
        <p style="font-size:11px;font-weight:900;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">This Week</p>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2 mb-6">${workoutCards.join('')}</div>
        <div class="space-y-3">
          <div data-action="open-workout" data-workout-id="CoolDown" data-workout-type="cooldown"
            class="workout-card cursor-pointer active:scale-[0.98] transition-transform" style="height:90px;background:${CARD_GRADIENTS['CoolDown']}">
            <div class="relative z-10 h-full flex items-center justify-between px-5">
              <div><span style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.7)">Recovery</span>
                <h3 class="font-black text-white text-base mt-0.5">${cool_down.workout_name}</h3></div>
              <div class="flex items-center gap-1 text-white"><span style="font-size:13px;font-weight:700">${cool_down.routine.length} exercises</span>${icon('chevron-right','w-4 h-4')}</div>
            </div>
          </div>
          <button data-action="open-progress" class="w-full bg-white rounded-2xl p-4 shadow-soft flex items-center gap-4 cursor-pointer active:scale-[0.98] transition-transform">
            <div class="w-11 h-11 rounded-full flex items-center justify-center shrink-0" style="background:rgba(0,167,157,.12)">${icon('trending-up','w-5 h-5 text-secondary')}</div>
            <div class="flex-1 text-left"><p class="font-bold text-gray-900">Progress &amp; History</p><p style="font-size:11px;color:#9ca3af;font-weight:500">${state.workoutHistory.length} session${state.workoutHistory.length!==1?'s':''} logged · ${getStreak()} day streak</p></div>
            ${icon('chevron-right','w-4 h-4 text-gray-300')}
          </button>
        </div>
      </div>
    </div>
    ${renderBottomNav()}`;
}

function renderExerciseCard(ex,showWeightTracker){
  const done=state.completedExercises.has(ex.id);
  const videoOpen=state.openVideos.has(ex.id);
  const pending=state.pendingWeightLogs[ex.id];
  const isRecorded=!!pending, effort=pending?.effort??null;
  const weight=state.exerciseWeights[ex.id]??0;
  const suggested=showWeightTracker&&!ex.noWeightInput?getSuggestedWeight(ex.id):null;
  const {embedUrl,isShort}=getEmbedInfo(ex.video);
  const EFFORT_LABELS=['Too Easy','Easy','Good','Hard','Max'];
  const EFFORT_ACTIVE=['bg-teal-100 text-teal-700 border-teal-400','bg-green-100 text-green-700 border-green-400','bg-yellow-100 text-yellow-700 border-yellow-400','bg-orange-100 text-orange-700 border-orange-400','bg-red-100 text-red-700 border-red-400'];
  let weightTrackerHtml='';
  if(showWeightTracker){
    const suggBadge=suggested!==null?`<div class="flex items-center gap-2 pt-1"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af">Suggested</span><span class="font-black text-secondary rounded-full px-2 py-0.5" style="font-size:11px;background:rgba(0,167,157,.1)">${Number.isInteger(suggested)?suggested:suggested.toFixed(1)} lbs</span></div>`:'';
    const weightRow=!ex.noWeightInput?`${suggBadge}<div class="flex items-center gap-3">${icon('dumbbell','w-4 h-4 text-gray-400 shrink-0')}<div class="flex items-center gap-2">
      <button data-action="adjust-weight" data-exercise-id="${ex.id}" data-delta="-2.5" class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 font-bold flex items-center justify-center active:scale-95 transition-transform text-base">−</button>
      <div class="flex items-center gap-1">
        <input type="number" id="weight-input-${ex.id}" data-action="weight-input" data-exercise-id="${ex.id}"
          value="${Number.isInteger(weight)?weight:weight.toFixed(1)}" min="0" step="2.5"
          style="width:64px;text-align:center;font-size:16px;font-weight:900;color:#111827;background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;padding:4px 0;outline:none"
          onfocus="this.style.borderColor='#F5C300'" onblur="this.style.borderColor='#e5e7eb'">
        <span style="font-size:11px;color:#9ca3af">lbs</span>
      </div>
      <button data-action="adjust-weight" data-exercise-id="${ex.id}" data-delta="2.5" class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 font-bold flex items-center justify-center active:scale-95 transition-transform text-base">+</button>
      </div><span id="saved-badge-${ex.id}" class="ml-auto font-bold text-secondary flex items-center gap-1 ${isRecorded?'':'hidden'}" style="font-size:11px">${icon('check','w-3.5 h-3.5')} Saved</span></div>`:'';
    const effortBtns=EFFORT_LABELS.map((label,i)=>{const val=i+1,sel=effort===val;return `<button data-action="select-effort" data-exercise-id="${ex.id}" data-effort="${val}" data-no-weight="${ex.noWeightInput?'1':'0'}" title="${label}" class="effort-btn flex-1 h-9 rounded-xl border-2 transition-all active:scale-95 ${sel?EFFORT_ACTIVE[i]+' scale-105':'bg-gray-50 text-gray-400 border-transparent'}" style="font-size:11px;font-weight:700">${val}</button>`;}).join('');
    const savedNoWeight=ex.noWeightInput?`<span id="saved-badge-${ex.id}" class="font-bold text-secondary flex items-center gap-1 ${isRecorded?'':'hidden'}" style="font-size:11px">${icon('check','w-3.5 h-3.5')} Saved</span>`:'';
    weightTrackerHtml=`<div class="px-4 pb-4 pt-2 border-t border-gray-50 space-y-3">${weightRow}<div class="space-y-1.5">
      <div class="flex items-center justify-between"><p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af">How hard was it?</p>${savedNoWeight}</div>
      <div class="flex gap-1.5" id="effort-row-${ex.id}">${effortBtns}</div>
      <div class="flex justify-between px-0.5" style="font-size:9px;color:#d1d5db;font-weight:600"><span>Too Easy</span><span>Max Effort</span></div></div></div>`;
  }
  const videoHtml=videoOpen?`<div class="w-full" style="${isShort?'aspect-ratio:9/16;max-height:380px':'aspect-ratio:16/9'}"><iframe src="${embedUrl}?autoplay=1&rel=0&modestbranding=1" class="w-full h-full" allow="autoplay; encrypted-media; fullscreen" allowfullscreen title="${ex.name}"></iframe></div>`:'';
  return `
    <div class="bg-white rounded-2xl overflow-hidden shadow-soft" id="card-${ex.id}">
      <div class="p-4 flex items-center gap-4">
        <div class="flex-1 min-w-0"><h4 class="font-bold text-sm mb-0.5 ${done?'text-gray-300 line-through':'text-gray-900'}">${ex.name}</h4><p style="font-size:11px;color:#9ca3af;font-weight:600">${ex.reps}</p></div>
        <button data-action="toggle-video" data-exercise-id="${ex.id}" class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 transition-colors" style="${videoOpen?'background:#111827;color:white':'background:#F5C300;color:#111827'}">
          ${videoOpen?icon('x','w-4 h-4'):icon('play','w-4 h-4 fill-current ml-0.5')}
        </button>
      </div>${weightTrackerHtml}${videoHtml}
    </div>`;
}
function renderBlockCheck(exerciseIds){
  const allDone=exerciseIds.length>0&&exerciseIds.every(id=>state.completedExercises.has(id));
  return `<button data-action="toggle-block" data-exercise-ids='${JSON.stringify(exerciseIds)}' class="w-9 h-9 rounded-full flex items-center justify-center transition-all shrink-0 ${allDone?'text-gray-900 scale-110':'border-2 border-gray-200 text-gray-300'}" style="${allDone?'background:#F5C300':''}">${icon('check','w-5 h-5')}</button>`;
}

function renderWorkoutDetail(){
  const w=state.activeWorkout,type=state.workoutType; if(!w) return '';
  const progress=getProgress();
  const stickyHdr=(title,subtitle)=>`
    <div class="sticky top-0 z-40" style="background:linear-gradient(180deg,#1a2235 0%,#111827 100%);box-shadow:0 8px 32px rgba(0,0,0,0.55),0 2px 0 rgba(255,255,255,0.08) inset">
      <div class="flex items-center px-4 gap-3" style="min-height:88px;padding-top:28px;padding-bottom:28px">
        <button data-action="go-home" class="w-10 h-10 flex items-center justify-center shrink-0 rounded-full" style="color:rgba(255,255,255,.7);background:rgba(255,255,255,.08)">${icon('arrow-left','w-5 h-5')}</button>
        <div class="flex-1 text-center">
          <h2 class="font-black text-white" style="font-size:18px;line-height:1.3">${title}</h2>
          <p style="font-size:11px;text-transform:uppercase;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.06em;margin-top:2px">${subtitle}</p>
        </div>
        <div class="w-10 shrink-0"></div>
      </div>
      <div class="w-full h-1" style="background:rgba(255,255,255,.1)"><div class="h-full transition-all duration-500 ease-out" style="width:${progress}%;background:#F5C300"></div></div>
    </div>`;
  const finishBtn=`<div class="fixed bottom-0 w-full max-w-[430px] p-5 pt-8" style="background:linear-gradient(to top,#F7F6F3 60%,transparent)">
    <button data-action="finish-workout" class="w-full font-black text-gray-900 text-base py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" style="background:#F5C300">${icon('check-circle-2','w-5 h-5')} FINISH WORKOUT</button></div>`;
  

  if(type==='cardio') return `<div class="flex flex-col w-full min-h-screen" style="background:#FEFCE8">
    ${stickyHdr(w.workout_name,w.category_title)}
    <div style="padding:24px 20px 120px"><div class="space-y-4" style="max-width:600px;margin:0 auto">
      <div class="rounded-2xl p-6 text-center" style="background:#111827">${icon('bike','w-12 h-12 text-secondary mx-auto mb-3')}<p class="font-black text-white text-xl">${w.workout_name}</p><p style="color:rgba(255,255,255,.5);font-size:14px;margin-top:4px">Recommended: <span style="font-weight:700;color:#00A79D">${w.recommended_time}</span></p></div>
      <div class="bg-white rounded-2xl p-5 shadow-soft space-y-3"><h3 class="font-black text-gray-900 uppercase tracking-tight text-sm">Structure</h3>
      ${w.instructions.map((s,i)=>`<div class="flex gap-3 items-start"><span class="w-6 h-6 rounded-full flex items-center justify-center shrink-0 font-black text-gray-900 mt-0.5" style="font-size:11px;background:#F5C300">${i+1}</span><p class="text-sm text-gray-700 font-medium pt-0.5">${s}</p></div>`).join('')}
      </div></div></div>
    ${finishBtn}</div>`;
  if(type==='cooldown'){const rids=w.routine.map(e=>e.id);return `<div class="flex flex-col w-full min-h-screen" style="background:#FEFCE8">
    ${stickyHdr(w.workout_name,w.category_title)}
    <div style="padding:24px 20px 120px"><section><div class="flex items-center justify-between mb-4"><h3 class="font-black text-gray-900 uppercase tracking-tight">Mobility Routine</h3>${renderBlockCheck(rids)}</div><div class="space-y-3">${w.routine.map(ex=>renderExerciseCard(ex,false)).join('')}</div></section></div>
    ${finishBtn}</div>`;}
  const wuIds=w.warm_up.map(e=>e.id);
  const wuCollapsed=state.warmUpCollapsed;
  const wuDone=wuIds.every(id=>state.completedExercises.has(id));
  return `<div class="flex flex-col w-full min-h-screen" style="background:#FEFCE8">${stickyHdr(w.workout_name,w.category_title)}<div class="px-5 py-6 space-y-8" style="padding-bottom:120px">
    <section>
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-black text-gray-900 uppercase tracking-tight">Warm Up</h3>
        <div class="flex items-center gap-2">
          <button data-action="toggle-warmup"
            class="flex items-center gap-1.5 rounded-xl px-3 py-1.5 transition-all active:scale-95"
            style="background:#d1d5db">
            ${icon(wuCollapsed?'chevron-down':'chevron-up','w-3.5 h-3.5 text-gray-500')}
            <span style="font-size:11px;font-weight:700;color:#6b7280">${wuCollapsed?'Show':'Hide'}</span>
          </button>
          ${renderBlockCheck(wuIds)}
        </div>
      </div>
      ${wuCollapsed
        ? ''
        : `<div class="space-y-3">${w.warm_up.map(ex=>renderExerciseCard(ex,false)).join('')}</div>`}
    </section>
    ${w.blocks.map(block=>{const bids=block.exercises.map(e=>e.id);return `<section><div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><h3 class="font-black text-gray-900 uppercase tracking-tight">${block.block_name}</h3><span class="font-black rounded-full px-3 py-1 text-gray-900" style="font-size:11px;background:#F5C300">3 ROUNDS</span></div>${renderBlockCheck(bids)}</div><div class="space-y-3">${block.exercises.map(ex=>renderExerciseCard(ex,true)).join('')}</div></section>`;}).join('')}
  </div>${finishBtn}</div>`;
}

  const dayRows=schedule.map((day,i)=>{
    const grad=CARD_GRADIENTS[day.workoutId]||CARD_GRADIENTS['Rest'];
    const isEditing=state.plannerEditDay===i;
    const accentColor=day.isRest?'#9ca3af':day.type==='cardio'?'#00A79D':'#F5C300';

      <div class="overflow-hidden border border-gray-100" style="border-radius:0 0 16px 16px;margin-top:-8px;padding-top:8px;background:white">

          return `<button data-action="planner-select" data-day-index="${i}" data-option-id="${opt.workoutId}"

            <div class="w-9 h-9 rounded-xl shrink-0 flex items-center justify-center" style="background:${g}">
              ${opt.isRest?icon('moon','w-4 h-4 text-white'):opt.type==='cardio'?icon('bike','w-4 h-4 text-white'):icon('dumbbell','w-4 h-4 text-white')}
            </div>
            <div class="flex-1 min-w-0">

function render(){
  let html='';
  if(state.activeView==='home')         html=renderHome();
  else if(state.activeView==='detail')  html=renderWorkoutDetail();
  else if(state.activeView==='complete')html=renderWorkoutComplete();
  else if(state.activeView==='history') html=''; // legacy, redirect to progress
  else if(state.activeView==='planner') html=renderPlanner();
  else if(state.activeView==='progress')html=renderProgress();
  if(state.activeView==='history'){state.activeView='progress';html=renderProgress();}
  document.getElementById('app').innerHTML=`<div class="app-outer min-h-screen w-full flex justify-center" style="background:#1a1a2e"><div class="app-frame w-full max-w-[430px] relative shadow-2xl overflow-x-hidden min-h-[100dvh]" style="background:#FEFCE8">${html}</div></div>`;
}

// ====================================================================
// EVENT HANDLER
// ====================================================================
document.getElementById('app').addEventListener('click',function(e){
  const el=e.target.closest('[data-action]'); if(!el) return;
  const action=el.dataset.action;

  if(action==='open-workout')    { openWorkout(el.dataset.workoutId,el.dataset.workoutType); }
  else if(action==='go-home')    { goHome(); }
  else if(action==='open-history'||action==='open-progress') { openProgress(); }
  else if(action==='open-planner') { openPlanner(); }
  else if(action==='toggle-block') { toggleBlock(JSON.parse(el.dataset.exerciseIds)); }
  else if(action==='finish-workout') { handleFinishWorkout(); }

  else if(action==='toggle-video'){
    const id=el.dataset.exerciseId;
    if(state.openVideos.has(id)){state.openVideos.delete(id);}else{state.openVideos.add(id);}
    render();
  }
  else if(action==='adjust-weight'){
    const id=el.dataset.exerciseId,delta=parseFloat(el.dataset.delta);
    const next=parseFloat(Math.max(0,(state.exerciseWeights[id]??0)+delta).toFixed(1));
    state.exerciseWeights[id]=next;
    const inp=document.getElementById(`weight-input-${id}`);
    if(inp) inp.value=Number.isInteger(next)?next:next.toFixed(1);
  }
  else if(action==='select-effort'){
    const id=el.dataset.exerciseId,effortVal=parseInt(el.dataset.effort),noWeight=el.dataset.noWeight==='1';
    const weight=noWeight?0:(state.exerciseWeights[id]??0);
    if(!noWeight&&weight<=0) return;
    state.pendingWeightLogs[id]={weight,effort:effortVal};
    const EA=['bg-teal-100 text-teal-700 border-teal-400','bg-green-100 text-green-700 border-green-400','bg-yellow-100 text-yellow-700 border-yellow-400','bg-orange-100 text-orange-700 border-orange-400','bg-red-100 text-red-700 border-red-400'];
    const row=document.getElementById(`effort-row-${id}`);
    if(row) row.querySelectorAll('[data-action="select-effort"]').forEach((btn,i)=>{btn.className=`effort-btn flex-1 h-9 rounded-xl border-2 transition-all active:scale-95 ${i+1===effortVal?EA[i]+' scale-105':'bg-gray-50 text-gray-400 border-transparent'}`;btn.style.cssText='font-size:11px;font-weight:700';});
    const badge=document.getElementById(`saved-badge-${id}`); if(badge) badge.classList.remove('hidden');
  }
  else if(action==='rate-workout'){
    state.completionRating=parseInt(el.dataset.rating);
    const row=document.getElementById('star-row');
    if(row) row.innerHTML=[1,2,3,4,5].map(n=>`<button class="star-btn" data-action="rate-workout" data-rating="${n}">${n<=state.completionRating?'★':'☆'}</button>`).join('');
  }
  // Planner
  else if(action==='planner-edit-day'){
    const idx=parseInt(el.dataset.dayIndex);
    state.plannerEditDay=state.plannerEditDay===idx?null:idx;
    render();
  }
  else if(action==='planner-select'){
    const idx=parseInt(el.dataset.dayIndex);
    const opt=WORKOUT_OPTIONS.find(o=>o.workoutId===el.dataset.optionId);
    if(opt){
      const schedule=getCustomSchedule().map(d=>({...d}));
      schedule[idx]={...schedule[idx],...opt};
      state.customSchedule=schedule;
      localStorage.setItem('sweat_schedule',JSON.stringify(state.customSchedule));
    }
    state.plannerEditDay=null; render();
  }
  else if(action==='reset-planner') { resetPlanner(); }
  // History / Reset (legacy)
  else if(action==='toggle-exercise-history'){
    const id=el.dataset.exerciseId;
    if(state.expandedExercises.has(id)){state.expandedExercises.delete(id);}else{state.expandedExercises.add(id);}
    render();
  }
  else if(action==='toggle-warmup') { state.warmUpCollapsed=!state.warmUpCollapsed; render(); }
  else if(action==='export-data')   { exportData(); }
  else if(action==='confirm-reset') { state.confirmReset=true; render(); }
  else if(action==='cancel-reset')  { state.confirmReset=false; render(); }
  else if(action==='do-reset')      { handleReset(); }
});

// ====================================================================
function generateAppIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const s = size / 180;

  // Green background
  ctx.fillStyle = '#2D6A4F';
  ctx.fillRect(0, 0, size, size);

  // Yellow circle with thin black outline
  ctx.beginPath();
  ctx.arc(size/2, size/2, 64*s, 0, Math.PI*2);
  ctx.fillStyle = '#F5C300';
  ctx.fill();
  ctx.strokeStyle = '#111827';
  ctx.lineWidth = 1.5*s;
  ctx.stroke();

  // Dumbbell shape (green, centered)
  ctx.strokeStyle = '#2D6A4F';
  ctx.lineCap = 'round';

  // Bar
  ctx.lineWidth = 10*s;
  ctx.beginPath(); ctx.moveTo(58*s, 90*s); ctx.lineTo(122*s, 90*s); ctx.stroke();

  // Left plate
  ctx.lineWidth = 16*s;
  ctx.beginPath(); ctx.moveTo(52*s, 73*s); ctx.lineTo(52*s, 107*s); ctx.stroke();
  ctx.lineWidth = 22*s;
  ctx.beginPath(); ctx.moveTo(44*s, 76*s); ctx.lineTo(44*s, 104*s); ctx.stroke();

  // Right plate
  ctx.lineWidth = 16*s;
  ctx.beginPath(); ctx.moveTo(128*s, 73*s); ctx.lineTo(128*s, 107*s); ctx.stroke();
  ctx.lineWidth = 22*s;
  ctx.beginPath(); ctx.moveTo(136*s, 76*s); ctx.lineTo(136*s, 104*s); ctx.stroke();

  return c.toDataURL('image/png');
}

function setupPWA() {
  const icon180 = generateAppIcon(180);
  const icon512 = generateAppIcon(512);

  // Apple touch icon (iOS home screen)
  const touchIcon = document.createElement('link');
  touchIcon.rel = 'apple-touch-icon'; touchIcon.sizes = '180x180'; touchIcon.href = icon180;
  document.head.appendChild(touchIcon);

  // Web app manifest (inline data URI — works for Android PWA + iOS)
  const manifest = {
    name: "Heather's Workout",
    short_name: "Workout",
    description: "Personalized weekly workout guide",
    start_url: location.pathname || '/',
    display: "standalone",
    orientation: "portrait",
    background_color: "#111827",
    theme_color: "#111827",
    icons: [
      { src: icon180, sizes: "180x180", type: "image/png", purpose: "any maskable" },
      { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(manifestLink);
}
